name: release

# Runs on a version tag (v1.2.3): GoReleaser cross-builds outpost, publishes a
# GitHub Release with archives + checksums + .deb/.rpm, and updates the Homebrew
# tap formula. Needs a TAP_GITHUB_TOKEN secret (PAT with write access to
# famgia/homebrew-tap); GITHUB_TOKEN is provided automatically.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
